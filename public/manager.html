<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feudle — Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07070f; --s1: #10101a; --s2: #1a1a28; --border: #252535;
    --accent: #f0c040; --red: #e05c5c; --green: #4ecb71; --blue: #5c9ee0;
    --text: #f0eff5; --muted: #6a698a; --r: 12px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
  #app { display: flex; flex-direction: column; height: 100%; }

  .topbar { display: flex; align-items: center; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--s1); gap: 12px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); letter-spacing: 3px; }
  .logo span { color: var(--muted); font-size: 13px; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; margin-left: 10px; }

  .layout { flex: 1; display: grid; grid-template-columns: 280px 1fr; overflow: hidden; }

  /* Sidebar */
  .sidebar { border-right: 1px solid var(--border); background: var(--s1); display: flex; flex-direction: column; overflow: hidden; }
  .sb-head { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sb-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .sb-count { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); }
  .sb-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
  .p-item { background: var(--s2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; display: flex; align-items: center; gap: 8px; }
  .p-av { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #e08820); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: #07070f; flex-shrink: 0; }
  .p-name { flex: 1; font-weight: 600; font-size: 13px; }
  .p-pts { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--accent); }
  .p-kick { background: none; border: 1px solid transparent; border-radius: 6px; color: var(--muted); cursor: pointer; padding: 3px 7px; font-size: 13px; transition: all .15s; width: auto; }
  .p-kick:hover { border-color: var(--red); color: var(--red); }
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 32px 16px; line-height: 1.8; }

  /* Stage */
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; overflow: hidden; }
  .sc { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 680px; }
  .sc.active { display: flex; }

  /* Login */
  .big-logo { font-family: 'Bebas Neue', sans-serif; font-size: 100px; color: var(--accent); letter-spacing: 8px; text-shadow: 0 0 60px rgba(240,192,64,.25); line-height: 1; }
  .sub { color: var(--muted); font-size: 15px; letter-spacing: 1px; margin: 10px 0 40px; }
  .row { display: flex; gap: 10px; width: 100%; max-width: 380px; }
  input { flex: 1; background: var(--s2); border: 1.5px solid var(--border); border-radius: 10px; padding: 13px 15px; font-size: 15px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s; }
  input:focus { border-color: var(--accent); }
  button { cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; }
  .btn { padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 700; border: none; letter-spacing: .3px; width: auto; white-space: nowrap; }
  .y { background: var(--accent); color: #07070f; }
  .y:hover { filter: brightness(1.1); }
  .r { background: var(--red); color: #fff; }
  .r:hover { filter: brightness(1.1); }
  .b { background: var(--blue); color: #fff; }
  .b:hover { filter: brightness(1.1); }
  .g { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .g:hover { border-color: var(--text); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .err { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; text-align: center; }

  /* Room code */
  .room-box { background: var(--s2); border: 2px dashed var(--border); border-radius: var(--r); padding: 28px 48px; text-align: center; margin-bottom: 28px; }
  .room-lbl { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .room-num { font-family: 'Bebas Neue', sans-serif; font-size: 88px; color: var(--accent); letter-spacing: 14px; line-height: 1; text-shadow: 0 0 50px rgba(240,192,64,.25); }
  .room-url { color: var(--muted); font-size: 12px; margin-top: 8px; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  /* Question */
  .ans-bar { width: 100%; background: var(--s2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .ans-lbl { color: var(--muted); font-size: 13px; }
  .ans-count { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--green); }
  .prog { width: 100%; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 24px; }
  .prog-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .5s ease; width: 0%; }
  .q-meta { color: var(--muted); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .big-q { font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px, 4.5vw, 60px); letter-spacing: 2px; text-align: center; line-height: 1.2; margin-bottom: 28px; }
  .timer-big { font-family: 'Bebas Neue', sans-serif; font-size: 88px; color: var(--accent); line-height: 1; transition: color .3s; }
  .timer-big.urgent { color: var(--red); }

  /* Reveal */
  .rev-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); letter-spacing: 3px; margin-bottom: 20px; }
  .g-grid { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .g-row { background: var(--s2); border: 1px solid var(--border); border-radius: var(--r); padding: 13px 18px; display: flex; align-items: center; gap: 14px; }
  .g-row.win { border-color: var(--green); background: #0c1f0e; }
  .g-rank { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--muted); min-width: 26px; }
  .g-row.win .g-rank { color: var(--green); }
  .g-can { flex: 1; font-weight: 700; font-size: 17px; text-transform: capitalize; }
  .g-var { font-size: 11px; color: var(--muted); flex: 2; }
  .g-votes { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--accent); }
  .g-row.win .g-votes { color: var(--green); }

  /* Leaderboard */
  .lb-title { font-family: 'Bebas Neue', sans-serif; font-size: 44px; color: var(--accent); letter-spacing: 4px; text-align: center; margin-bottom: 24px; }
  .lb-list { width: 100%; display: flex; flex-direction: column; gap: 7px; margin-bottom: 20px; }
  .lb-item { background: var(--s2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 18px; display: flex; align-items: center; gap: 14px; }
  .lb-item:nth-child(1) { border-color: #ffd700; background: #181500; }
  .lb-item:nth-child(2) { border-color: #c0c0c0; }
  .lb-item:nth-child(3) { border-color: #cd7f32; }
  .lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--muted); min-width: 36px; }
  .lb-item:nth-child(1) .lb-rank { color: #ffd700; }
  .lb-item:nth-child(2) .lb-rank { color: #c0c0c0; }
  .lb-item:nth-child(3) .lb-rank { color: #cd7f32; }
  .lb-name { flex: 1; font-size: 18px; font-weight: 700; }
  .lb-pts { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); }

  /* Finish */
  .fin-icon { font-size: 68px; margin-bottom: 14px; }
  .fin-title { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: var(--accent); letter-spacing: 4px; margin-bottom: 24px; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">FEUDLE <span>Host Dashboard</span></div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sb-head">
        <div class="sb-label">Players</div>
        <div class="sb-count" id="p-count">0</div>
      </div>
      <div class="sb-list" id="p-list">
        <div class="empty">No players yet.<br>Share the room code.</div>
      </div>
    </div>
    <div class="stage">

      <!-- Login / Create Room -->
      <div class="sc active" id="sc-login">
        <div class="big-logo">FEUDLE</div>
        <div class="sub">Family Feud · Live · Self-Hosted</div>
        <button class="btn y" id="b-create" style="font-size:16px;padding:14px 32px;">▶ Create Room</button>
        <div class="err" id="e-login"></div>
      </div>

      <!-- Lobby -->
      <div class="sc" id="sc-lobby">
        <div class="room-box">
          <div class="room-lbl">Room Code</div>
          <div class="room-num" id="room-num">------</div>
          <div class="room-url" id="room-url"></div>
        </div>
        <div class="actions">
          <button class="btn y" id="b-start">▶ Start Game</button>
          <button class="btn g" id="b-reset">↺ Reset</button>
        </div>
        <div class="err" id="e-lobby"></div>
      </div>

      <!-- Question -->
      <div class="sc" id="sc-question">
        <div class="ans-bar">
          <div class="ans-lbl">Answers received</div>
          <div class="ans-count" id="ans-count">0 / 0</div>
        </div>
        <div class="prog"><div class="prog-fill" id="prog"></div></div>
        <div class="q-meta" id="q-meta"></div>
        <div class="big-q" id="q-text"></div>
        <div class="timer-big" id="q-timer">30</div>
        <div class="actions" style="margin-top:24px">
          <button class="btn y" id="b-force">⚡ Force Reveal</button>
          <button class="btn r" id="b-abort">✕ Abort</button>
        </div>
      </div>

      <!-- Reveal -->
      <div class="sc" id="sc-reveal">
        <div class="rev-title">Round Results</div>
        <div class="g-grid" id="g-grid"></div>
        <div class="actions">
          <button class="btn b" id="b-lb">📊 Leaderboard</button>
          <button class="btn y" id="b-next">→ Next Question</button>
        </div>
      </div>

      <!-- Leaderboard -->
      <div class="sc" id="sc-leaderboard">
        <div class="lb-title">Leaderboard</div>
        <div class="lb-list" id="lb-list"></div>
        <div class="actions">
          <button class="btn y" id="b-next2">→ Next Question</button>
        </div>
      </div>

      <!-- Finish -->
      <div class="sc" id="sc-finish">
        <div class="fin-icon">🏆</div>
        <div class="fin-title">GAME OVER</div>
        <div class="lb-list" id="fin-lb" style="width:100%;max-width:500px"></div>
        <div class="actions" style="margin-top:24px">
          <button class="btn g" id="b-newgame">↺ New Game</button>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io()
let players = [], stageTimer = null

const $ = id => document.getElementById(id)
function show(id) {
  document.querySelectorAll('.sc').forEach(s => s.classList.remove('active'))
  $('sc-' + id).classList.add('active')
}

function renderPlayers() {
  $('p-count').textContent = players.length
  if (!players.length) { $('p-list').innerHTML = '<div class="empty">No players yet.<br>Share the room code.</div>'; return }
  $('p-list').innerHTML = [...players].sort((a,b) => b.points-a.points).map(p =>
    `<div class="p-item">
      <div class="p-av">${p.username[0].toUpperCase()}</div>
      <div class="p-name">${p.username}</div>
      <div class="p-pts">${p.points}</div>
      <button class="p-kick" onclick="kick('${p.id}')">✕</button>
    </div>`
  ).join('')
}

function kick(id) { socket.emit('manager:kickPlayer', id) }

// Create room — no password needed
$('b-create').onclick = () => {
  $('b-create').disabled = true
  $('b-create').textContent = 'Creating…'
  $('e-login').textContent = ''
  socket.emit('manager:createRoom')
}

socket.on('manager:roomCreated', ({ room }) => {
  $('room-num').textContent = room
  $('room-url').textContent = `${location.hostname}:${location.port} → code: ${room}`
  show('lobby')
})

$('b-start').onclick = () => {
  $('b-start').disabled = true
  $('b-start').textContent = 'Starting…'
  socket.emit('manager:startGame')
}
$('b-reset').onclick = () => { if (confirm('Reset the game?')) socket.emit('manager:resetGame') }
$('b-force').onclick = () => socket.emit('manager:forceReveal')
$('b-abort').onclick = () => { if (confirm('Abort the quiz?')) socket.emit('manager:resetGame') }
$('b-lb').onclick = () => socket.emit('manager:showLeaderboard')
$('b-next').onclick = () => socket.emit('manager:nextQuestion')
$('b-next2').onclick = () => socket.emit('manager:nextQuestion')
$('b-newgame').onclick = () => socket.emit('manager:resetGame')

socket.on('manager:playerList', list => { players = list; renderPlayers() })

socket.on('manager:answeredCount', ({ answered, total }) => {
  $('ans-count').textContent = `${answered} / ${total}`
  $('prog').style.width = `${total > 0 ? (answered/total)*100 : 0}%`
})

socket.on('game:status', ({ name, data }) => {
  if (name === 'STARTING') {
    // Re-enable start button for next game
    $('b-start').disabled = false
    $('b-start').textContent = '▶ Start Game'
    show('question')
    return
  }

  if (name === 'QUESTION') {
    clearInterval(stageTimer)
    $('ans-count').textContent = `0 / ${players.length}`
    $('prog').style.width = '0%'
    $('q-meta').textContent = `Question ${data.questionIndex + 1} of ${data.total}`
    $('q-text').textContent = data.question
    $('q-timer').textContent = data.time
    $('q-timer').classList.remove('urgent')
    show('question')
    let t = data.time
    stageTimer = setInterval(() => {
      t--
      $('q-timer').textContent = t
      if (t <= 5) $('q-timer').classList.add('urgent')
      if (t <= 0) clearInterval(stageTimer)
    }, 1000)
    return
  }

  if (name === 'REVEALING') {
    clearInterval(stageTimer)
    $('g-grid').innerHTML = data.groups.length === 0
      ? '<div style="color:var(--muted);text-align:center;padding:20px">No answers were submitted</div>'
      : data.groups.map((g, i) =>
        `<div class="g-row ${g.isWinner ? 'win' : ''}">
          <div class="g-rank">${i+1}</div>
          <div class="g-can">${g.canonical}</div>
          <div class="g-var">${g.members.map(m => m.original).join(', ')}</div>
          <div class="g-votes">${g.count}</div>
        </div>`
      ).join('')
    show('reveal')
    return
  }

  if (name === 'LEADERBOARD') {
    $('lb-list').innerHTML = data.leaderboard.map((p, i) =>
      `<div class="lb-item">
        <div class="lb-rank">${i+1}</div>
        <div class="lb-name">${p.username}</div>
        <div class="lb-pts">${p.points}</div>
      </div>`
    ).join('')
    show('leaderboard')
    return
  }

  if (name === 'FINISH') {
    clearInterval(stageTimer)
    $('fin-lb').innerHTML = data.leaderboard.map((p, i) =>
      `<div class="lb-item">
        <div class="lb-rank">${i+1}</div>
        <div class="lb-name">${p.username}</div>
        <div class="lb-pts">${p.points}</div>
      </div>`
    ).join('')
    show('finish')
    return
  }
})

socket.on('game:error', msg => {
  // Always re-enable buttons on error
  $('b-create').disabled = false
  $('b-create').textContent = '▶ Create Room'
  $('b-start').disabled = false
  $('b-start').textContent = '▶ Start Game'

  const a = document.querySelector('.sc.active')?.id
  if (a === 'sc-login') $('e-login').textContent = msg
  else if (a === 'sc-lobby') $('e-lobby').textContent = msg
  else alert(msg)
})

socket.on('game:reset', () => {
  clearInterval(stageTimer)
  players = []
  renderPlayers()
  $('b-create').disabled = false
  $('b-create').textContent = '▶ Create Room'
  $('b-start').disabled = false
  $('b-start').textContent = '▶ Start Game'
  $('e-login').textContent = ''
  $('e-lobby').textContent = ''
  show('login')
})

socket.on('disconnect', () => {
  clearInterval(stageTimer)
})
</script>
</body>
</html>
